:root{--hunt:#2F4734;--ox:#6B2227;--gold:#B08D2B;--parch:#F4EEE1;--ink:#1E1E1E;

*{box-sizing:border-box}
body{margin:0;background:var(--parch);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.45;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,.serif{font-family:Georgia,"Times New Roman",serif}
.top{position:sticky;top:0;z-index:30;background:var(--hunt);padding:10px 16px 0}
.brand{display:flex;align-items:baseline;gap:10px;max-width:1200px;margin:0 auto;flex-wrap:wrap}
.brand b{font-family:Georgia,serif;font-size:17px;color:#fff}
.brand span{font-size:11.5px;color:#cdd7cc}
.tabs{display:flex;gap:1px;max-width:1200px;margin:8px auto 0;overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font:inherit;font-size:12.5px;font-weight:600;padding:8px 12px;border:none;background:transparent;color:#cdd7cc;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:color .15s}
.tab.on{color:#fff;border-bottom-color:var(--gold)}
.tab:hover:not(.on){color:#e8e3d8}
.wrap{max-width:1200px;margin:0 auto;padding:20px 14px 90px}
section.pane{display:none} section.pane.on{display:block}
h2.sec{font-size:22px;color:var(--hunt);margin:0 0 4px;border-bottom:2px solid var(--gold);padding-bottom:7px}
.lede{color:var(--muted);font-size:13.5px;margin:6px 0 16px;max-width:88ch}

.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.card.tight{padding:10px 14px}
.kpi{display:grid;gap:9px;margin:6px 0 14px}
.kpi.c5{grid-template-columns:repeat(5,1fr)}
.kpi.c4{grid-template-columns:repeat(4,1fr)}
.kpi.c3{grid-template-columns:repeat(3,1fr)}
.kbox{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:11px 10px;text-align:center}
.kbox.hi{background:rgba(47,71,52,.09);border-color:rgba(47,71,52,.3)}
.kbox.warn{background:#f6efe0;border-color:var(--gold)}
.kbox .k{font-family:Georgia,serif;font-size:20px;font-weight:700;color:var(--hunt);line-height:1.1}
.kbox.warn .k{color:var(--ox)}
.kbox .l{font-size:10.5px;color:var(--muted);margin-top:4px}
.note{background:#fff6ec;border:1px solid var(--gold);border-left:4px solid var(--hunt);padding:8px 12px;font-size:12.5px;color:#4a463c;border-radius:0 4px 4px 0;margin:10px 0}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.ctrl{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center}
.ctrl label{font-size:11.5px;font-weight:700;color:var(--muted)}
select,input[type=range]{font:inherit;font-size:12.5px;padding:4px 7px;border:1px solid var(--line);border-radius:5px;background:var(--card);color:var(--ink);cursor:pointer}
select:focus{outline:2px solid var(--gold);border-color:var(--gold)}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:6px 8px;text-align:center;border:1px solid var(--line)}
th{background:var(--hunt);color:#f3efe3;font-weight:600;font-size:11px;position:sticky;top:0}
td:first-child,th:first-child{text-align:left;font-weight:700}
tr:nth-child(even) td{background:var(--alt)}
.scroll{overflow-x:auto}
.hbar-row{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12.5px}
.hbar-row .lbl{min-width:130px;font-weight:600}
.hbar-row .bar{flex:1;background:var(--line);border-radius:3px;height:15px;position:relative}
.hbar-row .bar span{display:block;height:100%;border-radius:3px;position:absolute;top:0;left:0}
.hbar-row .val{min-width:90px;text-align:right;color:var(--muted);font-size:12px}
.legend{display:flex;gap:12px;font-size:11.5px;color:var(--muted);margin-top:8px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
.sw{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.met-row{display:grid;grid-template-columns:1fr auto 90px auto;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--none);font-size:12.5px}
.met-row:last-child{border:none}
.met-bar{height:8px;border-radius:2px;background:var(--none);position:relative;width:90px}
.met-bar span{display:block;height:100%;border-radius:2px;position:absolute;top:0;left:0}
.met-val{font-weight:700;font-size:13px;text-align:right}
.delta-pos{color:var(--hunt);font-weight:700;font-size:11px}
.delta-neg{color:var(--ox);font-weight:700;font-size:11px}
ul.di{list-style:none;padding:0;margin:8px 0}
ul.di li{position:relative;padding-left:18px;margin-bottom:7px;font-size:13.5px}
ul.di li:before{content:"◆";color:var(--gold);position:absolute;left:0;font-size:10px;top:3px}
.prose-card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-bottom:6px}
.prose-label{font-family:Georgia,serif;font-weight:700;color:var(--hunt);font-size:13px}
.prose-text{font-size:12.5px;color:var(--ink);margin-top:3px}
.prose-n{font-size:11px;color:var(--muted)}
svg{display:block}
@media(max-width:700px){.two,.three{grid-template-columns:1fr}.kpi.c5,.kpi.c4{grid-template-columns:repeat(2,1fr)}}
</style>

function hbars(elid,rows,fmtFn,maxv){ if(!el(elid))return;
  const max=maxv||Math.max(...rows.map(r=>r.v||0),0.01);
  el(elid).innerHTML=rows.map(r=>{
    const w=Math.round((r.v||0)/max*100);
    return `<div class="hbar-row"><div class="lbl">${r.l}</div>
      <div class="bar"><span style="width:${w}%;background:${r.c||HUNT}"></span></div>
      <div class="val">${fmtFn(r)}</div></div>`;
  }).join('');
}

function svgBars(elid,labels,vals,cols,lo,hi,W,H,L,R,T,B,fmtFn){
  const bw=(W-L-R)/labels.length; const y=v=>H-B-(v-lo)/(hi-lo||1)*(H-T-B);
  let g='';
  for(let v=lo;v<=hi;v+=(hi-lo)/4){
    g+=`<line x1="${L}" y1="${y(v)}" x2="${W-R}" y2="${y(v)}" stroke="#e6ddc7"/>
    <text x="${L-5}" y="${y(v)+3}" text-anchor="end" font-size="9" fill="${GREY}">${fmtFn(v)}</text>`;}
  labels.forEach((lbl,i)=>{
    const v=vals[i]; if(v==null) return;
    const x=L+i*bw+bw/2; const col=Array.isArray(cols)?cols[i]:cols;
    g+=`<rect x="${L+i*bw+bw*0.15}" y="${y(v)}" width="${bw*0.7}" height="${H-B-y(v)}" fill="${col}" rx="2"/>
    <text x="${x}" y="${y(v)-4}" text-anchor="middle" font-size="9.5" font-weight="700" fill="${col}">${fmtFn(v)}</text>
    <text x="${x}" y="${H-B+14}" text-anchor="middle" font-size="9.5">${lbl}</text>`;
  });
  el(elid).innerHTML=g;
}

function heatTable(elid,rows,cols,getv,fmtFn,rowlabel){
  const vals=rows.flatMap(r=>cols.map(c=>{const v=getv(r,c);return v!=null?v:null})).filter(v=>v!=null);
  if(!vals.length){el(elid).innerHTML='<div style="color:var(--muted);font-size:12px;padding:8px">No data</div>';return;}
  const lo=Math.min(...vals),hi=Math.max(...vals);
  let t=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px">`;
  t+=`<thead><tr><th style="background:var(--hunt);color:#fff;padding:6px 8px;text-align:left">${rowlabel||''}</th>${cols.map(c=>`<th style="background:var(--hunt);color:#fff;padding:6px 8px">${c}</th>`).join('')}</tr></thead><tbody>`;
  rows.forEach(r=>{
    t+=`<tr><td style="font-weight:700;padding:6px 8px;border:1px solid var(--line)">${r}</td>`;
    cols.forEach(c=>{const v=getv(r,c); if(v==null){t+=`<td style="padding:6px 8px;border:1px solid var(--line);color:var(--muted);font-style:italic">n/a</td>`;return;}
      const heat=(v-lo)/(hi-lo||1);
      const bg=`rgba(47,71,52,${(0.07+heat*0.7).toFixed(2)})`;const fg=heat>0.55?"#fff":INK;
      t+=`<td style="background:${bg};color:${fg};font-weight:700;padding:6px 8px;border:1px solid var(--line);text-align:center">${fmtFn(v)}</td>`;
    });t+=`</tr>`;
  });
  el(elid).innerHTML=t+'</tbody></table></div>';
}

// ── TIME OF DAY (interactive linked crosshair) ───────────────────────
(function(){

const SERVICE_NIGHTS=385;

let activeHour=null;

// ── CHART GEOMETRY ────────────────────────────────────────────────
const GEO={
  curve:{W:700,H:260,L:44,R:56,T:14,B:34},
  mix:  {W:700,H:260,L:30,R:12,T:12,B:32},
  when: {W:500,H:250,L:34,R:88,T:12,B:28},
  food: {W:500,H:250,L:34,R:88,T:12,B:28},
};
function hx(g,h){const g2=GEO[g];return g2.L+(HRS.indexOf(h))/(HRS.length-1)*(g2.W-g2.L-g2.R);}
function nearestHour(g,clientX,svgEl){
  const rect=svgEl.getBoundingClientRect();
  const g2=GEO[g];const pxPerStep=(g2.W-g2.L-g2.R)/(HRS.length-1);
  const svgX=(clientX-rect.left)*(g2.W/rect.width);
  const idx=Math.round((svgX-g2.L)/pxPerStep);
  return HRS[Math.max(0,Math.min(idx,HRS.length-1))];

// ── CROSSHAIR + TOOLTIP ──────────────────────────────────────────
function showCrosshair(hour,e){

    let cr=sv.querySelector('.tod-cr');

    const g=GEO[id];const x=hx(id,hour);
    cr.setAttribute('x1',x);cr.setAttribute('x2',x);cr.setAttribute('y1',g.T);cr.setAttribute('y2',g.H-g.B);
    cr.style.display='';
  });
  // Tooltip
  const tip=el('tod_tooltip');if(!tip)return;
  const h2=hr[hour]||{};const bh2=bh[hour]||{};const fp2=fp[hour]||{};const m2=mix[hour]||{};
  const total2=HRS.reduce((s,h)=>s+(hr[h]?hr[h].covers:0),0);const cpn=h2.covers?Math.round(h2.covers/total2*1000)/10:0;

  html+=`<div style="margin-bottom:6px"><b>${cpn}% of day\'s checks</b> open this hour · avg check <b>$${h2.modeled_check?h2.modeled_check.toFixed(0):0}</b></div>`;
  html+='<div style="font-size:10.5px;opacity:.7;margin-bottom:3px">Food penetration:</div>';
  Object.entries(fp2).forEach(([k,v])=>html+=`<div style="display:flex;justify-content:space-between;gap:12px"><span>${k}</span><span><b>${v}%</b></span></div>`);
  if(Object.keys(bh2).length){html+='<div style="font-size:10.5px;opacity:.7;margin:4px 0 3px">Drink penetration:</div>';

  tip.innerHTML=html;tip.style.display='block';

function hideCrosshair(){

}
['curve','mix','when','food'].forEach(id=>{
  const sv=el('tod_'+id);if(!sv)return;
  const handler=(ev)=>{const h3=nearestHour(id,ev.clientX||ev.touches?.[0]?.clientX||0,sv);showCrosshair(h3,ev);};

  el('dp_tbl').innerHTML=t+'</tbody></table>';}
['dp_met','dp_dp'].forEach(id=>el(id)&&(el(id).onchange=dpRender));dpRender();
})();
